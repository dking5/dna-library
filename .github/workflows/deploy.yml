name: DNA Project CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCP
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and Push Image
      run: |
        gcloud builds submit --tag us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dna-repo/dna-app:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy dna-service \
          --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dna-repo/dna-app:${{ github.sha }} \
          --region us-central1 \
          --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:us-central1:dna-db-instance \
          --update-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}" \
          --allow-unauthenticated