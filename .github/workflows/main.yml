name: DNA Project CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Fix the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Initialize a live PostgreSQL instance for integration testing in the CI environment
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dna_db_test
        ports:
          - 5432:5432
        # Ensure database is healthy and ready to accept connections before starting tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Note: Use setup-python here instead of checkout
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx  # Install testing framework and async HTTP client

    - name: Run Tests with Coverage
      env:
        # Inject the CI database URL to override local/production settings
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/dna_db_test
      run: |
        python -m pytest --cov=app --cov-report=term-missing
    
    - name: Build Docker Image
      run: |
        docker build -t dna-app:latest .