version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: pgvector/pgvector:pg15
    container_name: dna_db_container
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dna_db
    ports:
      - "5432:5432"
    volumes:
      # Persistent storage so your DNA data survives container restarts
      - postgres_data:/var/lib/postgresql/data

  # Cache Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: dna_redis_container
    # Enable AOF (Append Only File) for data persistence
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    restart: always

  # FastAPI Application Service
  web:
    env_file:
      - .env
    build: .
    container_name: dna_app_container
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/dna_db
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      # Ensures database and redis start before the web app
      - db
      - redis

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      
# Named volume for database persistence
volumes:
  postgres_data: